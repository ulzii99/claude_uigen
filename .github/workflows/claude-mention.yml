name: Claude Mention Action

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  respond-to-mention:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, '@claude') || contains(github.event.comment.body, '@claude')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Respond to @claude mention
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TITLE: ${{ github.event.issue.title || github.event.pull_request.title }}
          ISSUE_BODY: ${{ github.event.issue.body || github.event.comment.body }}
          REPO_NAME: ${{ github.repository }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          const { execSync } = require('child_process');

          const ANTHROPIC_API_KEY = process.env.ANTHROPIC_API_KEY;
          const GITHUB_TOKEN = process.env.GITHUB_TOKEN;
          const ISSUE_NUMBER = process.env.ISSUE_NUMBER;
          const ISSUE_TITLE = process.env.ISSUE_TITLE;
          const ISSUE_BODY = process.env.ISSUE_BODY;
          const REPO_NAME = process.env.REPO_NAME;

          // Get repository context
          let repoContext = '';
          try {
            const files = execSync('find . -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" | head -20').toString();
            repoContext = `Repository files:\n${files}`;
          } catch (e) {
            repoContext = 'Could not list repository files';
          }

          // Call Claude API
          const prompt = `You are Claude Code, an AI assistant helping with a GitHub repository.

Issue/PR Title: ${ISSUE_TITLE}

Issue/PR Description:
${ISSUE_BODY}

Repository Context:
${repoContext}

The user has mentioned @claude in this issue/PR. Please analyze the issue and provide a helpful response. If they're asking you to investigate something, explain what you found. If they're asking you to verify something, test it and report back. Be concise and actionable.`;

          const data = JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 2048,
            messages: [{
              role: 'user',
              content: prompt
            }]
          });

          const options = {
            hostname: 'api.anthropic.com',
            path: '/v1/messages',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': ANTHROPIC_API_KEY,
              'anthropic-version': '2023-06-01',
              'Content-Length': data.length
            }
          };

          const anthropicReq = https.request(options, (res) => {
            let body = '';
            res.on('data', (chunk) => body += chunk);
            res.on('end', () => {
              try {
                const response = JSON.parse(body);
                const claudeResponse = response.content[0].text;

                // Post comment to GitHub
                const commentData = JSON.stringify({
                  body: `${claudeResponse}\n\n---\n*🤖 Response from Claude Code*`
                });

                const commentOptions = {
                  hostname: 'api.github.com',
                  path: `/repos/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments`,
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'User-Agent': 'Claude-Code-Action',
                    'Content-Length': commentData.length
                  }
                };

                const githubReq = https.request(commentOptions, (ghRes) => {
                  console.log('Comment posted successfully');
                });

                githubReq.on('error', (e) => {
                  console.error('Error posting comment:', e);
                  process.exit(1);
                });

                githubReq.write(commentData);
                githubReq.end();

              } catch (e) {
                console.error('Error parsing Claude response:', e);
                process.exit(1);
              }
            });
          });

          anthropicReq.on('error', (e) => {
            console.error('Error calling Claude API:', e);
            process.exit(1);
          });

          anthropicReq.write(data);
          anthropicReq.end();
          EOF
