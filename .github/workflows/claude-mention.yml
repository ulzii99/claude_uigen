name: Claude Mention Action

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  respond-to-mention:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, '@claude') || contains(github.event.comment.body, '@claude')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Respond to mention
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const issueBody = context.payload.issue?.body || context.payload.comment?.body || '';
            const issueTitle = context.payload.issue?.title || 'Comment on issue';

            // Call Claude API
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 2048,
                messages: [{
                  role: 'user',
                  content: `You are Claude Code, an AI assistant helping with a GitHub repository.

            Issue/PR Title: ${issueTitle}

            Issue/PR Description:
            ${issueBody}

            The user has mentioned @claude in this issue. Please analyze the issue and provide a helpful response. If they're asking you to investigate something, explain what you found. If they're asking you to verify something, test it and report back. Be concise and actionable.`
                }]
              })
            });

            const data = await response.json();
            const claudeResponse = data.content[0].text;

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `${claudeResponse}\n\n---\n*🤖 Response from Claude Code*`
            });
